<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportClub - Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/registro.css">
</head>
<body>

  <div class="page">
    <div class="card">

      <!-- LOGO -->
      <div class="card-logo">
        <img src="../assets/img/logo.png" alt="SportClub Logo">
      </div>

      <h1 class="card-title">Crear cuenta</h1>
      <p class="card-subtitle">Únete a SportClub y empieza hoy</p>

      <form class="form" onsubmit="return false;">

        <!-- SECCIÓN 1: DATOS BÁSICOS -->
        <div class="form-section">
          <h2 class="form-section-title">Datos personales</h2>

          <div class="input-group">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" placeholder="Ingresa tu nombre">
          </div>

          <div class="input-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="Ingresa tu correo">
          </div>

          <div class="input-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Crea una contraseña">
          </div>

          <div class="input-group">
            <label for="edad">Edad</label>
            <input type="number" id="edad" placeholder="Tu edad" min="10" max="99">
          </div>

        </div>

        <!-- SECCIÓN 2: PERFIL DEPORTIVO -->
        <div class="form-section">
          <h2 class="form-section-title">Perfil deportivo</h2>

          <div class="input-group">
            <label for="deporte">Deporte favorito</label>
            <select id="deporte">
              <option value="" disabled selected>Selecciona un deporte</option>
              <option value="futbol">Fútbol</option>
              <option value="basquetbol">Básquetbol</option>
              <option value="natacion">Natación</option>
              <option value="ciclismo">Ciclismo</option>
              <option value="atletismo">Atletismo</option>
              <option value="tenis">Tenis</option>
              <option value="artes_marciales">Artes marciales</option>
              <option value="otro">Otro</option>
            </select>
          </div>

          <div class="input-group">
            <label>Tipo de actividad que te interesa</label>
            <div class="checkbox-group">
              <label class="check-item">
                <input type="checkbox" name="actividad" value="clases_grupales">
                <span>Clases grupales</span>
              </label>
              <label class="check-item">
                <input type="checkbox" name="actividad" value="entrenamiento_personal">
                <span>Entrenamiento personal</span>
              </label>
              <label class="check-item">
                <input type="checkbox" name="actividad" value="sala_pesas">
                <span>Sala de pesas</span>
              </label>
              <label class="check-item">
                <input type="checkbox" name="actividad" value="cardio">
                <span>Cardio</span>
              </label>
              <label class="check-item">
                <input type="checkbox" name="actividad" value="deportes">
                <span>Deportes en cancha</span>
              </label>
            </div>
          </div>

          <div class="input-group">
            <label>¿Cuál es tu objetivo?</label>
            <div class="radio-group">
              <label class="radio-item">
                <input type="radio" name="objetivo" value="bajar_peso">
                <span>Bajar de peso</span>
              </label>
              <label class="radio-item">
                <input type="radio" name="objetivo" value="mantenerse">
                <span>Mantenerse activo</span>
              </label>
              <label class="radio-item">
                <input type="radio" name="objetivo" value="funcional">
                <span>Entrenamiento funcional</span>
              </label>
              <label class="radio-item">
                <input type="radio" name="objetivo" value="muscle">
                <span>Ganar músculo</span>
              </label>
              <label class="radio-item">
                <input type="radio" name="objetivo" value="competir">
                <span>Competir</span>
              </label>
            </div>
          </div>

        </div>

        <button type="submit" class="btn-registro">Crear cuenta</button>

      </form>

      <div class="card-links">
        <span>¿Ya tienes cuenta?</span>
        <a href="login.html">Inicia sesión</a>
      </div>

    </div>
  </div>

</body>
</html>
