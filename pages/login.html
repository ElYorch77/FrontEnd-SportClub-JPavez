<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportClub - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

  <div class="page">

    <!-- LADO IZQUIERDO -->
    <div class="page-left">
      <div class="brand">
        <img src="../assets/img/logo.png" alt="SportClub">
        <p class="brand-slogan">Tu mejor versión comienza hoy</p>
      </div>
      <div class="brand-stats">
        <div class="stat">
          <span class="stat-num">+500</span>
          <span class="stat-label">Miembros</span>
        </div>
        <div class="stat">
          <span class="stat-num">20+</span>
          <span class="stat-label">Clases</span>
        </div>
        <div class="stat">
          <span class="stat-num">10</span>
          <span class="stat-label">Coaches</span>
        </div>
      </div>
    </div>

    <!-- LADO DERECHO -->
    <div class="page-right">
      <div class="card">

        <h1 class="card-title">Iniciar sesión</h1>
        <p class="card-subtitle">Ingresa tus credenciales para continuar</p>

        <form class="form" onsubmit="return false;">

          <div class="input-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="Ingresa tu correo">
          </div>

          <div class="input-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Ingresa tu contraseña">
          </div>

          <button type="submit" class="btn-ingresar" onclick="window.location.href='dashboard-usuario.html'">
            Ingresar
          </button>

        </form>

        <div class="card-links">
          <a href="recuperar.html">¿Olvidaste tu contraseña?</a>
          <span class="divider">|</span>
          <a href="registro.html">Registrarse</a>
        </div>

        <!-- ACCESOS RÁPIDOS -->
        <div class="accesos-rapidos">
          <p class="accesos-label">Accesos rápidos para revisión</p>
          <div class="accesos-btns">
            <a href="dashboard-coach.html" class="btn-acceso btn-coach">Dashboard Coach</a>
            <a href="dashboard-admin.html" class="btn-acceso btn-admin">Dashboard Admin</a>
          </div>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
